name: ci

# ─────────────────────────────────────────────────────────────────────────────
# What "green" means here (Phase 3 / Strand 2).
#
# Local dev runs the quartet with `corepack pnpm` (pnpm is not on PATH); CI
# uses `pnpm/action-setup`, which reads the pinned pnpm from package.json's
# `packageManager` field — the single source of truth. Do NOT also pass a
# `version:` input here: that double-specs the pnpm version against
# `packageManager`, and pnpm hard-errors (`ERR_PNPM_BAD_PM_VERSION`). Both
# paths resolve the same pinned pnpm and run
# the identical root scripts, so a local green and a CI green mean the same
# thing.
#
# Coverage: `verify` runs the ROOT scripts only. Those are recursive
# (`lint`/`test`/`build` = `pnpm -r …`) and topological (`typecheck` builds
# @wdk-web/wallet-core first, then `pnpm -r typecheck`). Via
# pnpm-workspace.yaml (`apps/*`) this AUTOMATICALLY covers BOTH apps/next and
# apps/svelte with no per-app step. The @tetherto/* alpha-containment guard
# (eslint.config.mjs, applied to *.ts AND *.svelte) and the full test set
# (wallet-core + apps/svelte D-07 headless portability) all run under these
# same invocations. Node matrix: 20 = the WDK-alpha / Next-15 / React-19
# pinned floor; 22 = low-cost forward insurance (engines: ">=20"). fail-fast
# is off so each node version reports its own honest, independent result.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push: { branches: ["**"] }
  pull_request:

# Least-privilege: this workflow only reads the repo — it builds, tests, and
# scans, but never writes releases, comments, or deploys. Narrow the default
# GITHUB_TOKEN to read-only so a compromised step (or dependency pulled during
# install) cannot push, tag, or open PRs with the workflow's credentials.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "${{ matrix.node }}", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
  # End-to-end smoke: builds + serves the production app and drives a real
  # headless browser under the LIVE strict CSP. This is the only job that proves
  # the nonce-CSP / hydration path works end to end — `verify` (build/typecheck)
  # cannot catch a CSP that blocks the app at runtime. Network-independent
  # (BTC unconfigured; asserts only on client-derived / local UI), Node 20 only
  # (the browser layer needs no version matrix; `verify` covers 20 + 22).
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "20", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm smoke
  # Accessibility gate: same build + serve + headless-browser path as smoke, but
  # runs axe-core (WCAG 2.0/2.1 A+AA) across the wallet's screens and fails on any
  # violation at impact >= serious. Proves the a11y bar at runtime, not in review.
  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "20", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm a11y
  # Dependency advisory gate: `--audit-level moderate` is the bar the project
  # commits to (BOUNTY-CHECKLIST). It must pass with only the one documented,
  # no-patch-available `elliptic` low advisory in the alpha BTC WDK chain.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "20", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level moderate
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: fail on committed secrets
        # Excludes files that legitimately CONTAIN the secret-shaped strings
        # because they *define or document* them, not because a key leaked:
        # *.example (templates), SECURITY.md (threat model), and this very
        # workflow (its own rule literally spells out "PRIVATE KEY" /
        # "API_KEY="). Without the ci.yml exclusion the scanner flags its own
        # definition and the job can never pass — same rationale, same idiom
        # as the pre-existing SECURITY.md exclusion.
        run: |
          if git grep -nE '(PRIVATE KEY|API_KEY=[A-Za-z0-9]{12,})' -- . ':!*.example' ':!**/SECURITY.md' ':!**/ci.yml'; then
            echo "secret-shaped string committed"; exit 1
          fi
