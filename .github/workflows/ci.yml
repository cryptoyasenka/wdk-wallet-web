name: ci
on:
  push: { branches: ["**"] }
  pull_request:
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fail on committed secrets
        run: |
          if git grep -nE '(PRIVATE KEY|API_KEY=[A-Za-z0-9]{12,})' -- . ':!*.example' ':!**/SECURITY.md'; then
            echo "secret-shaped string committed"; exit 1
          fi
